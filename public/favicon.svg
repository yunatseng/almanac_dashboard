<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f59e0b"/>
      <stop offset="45%"  stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.8" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="32" height="32" rx="7" ry="7"
        fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <!-- 曆 character -->
  <text
    x="16" y="23"
    text-anchor="middle"
    font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', serif"
    font-size="20"
    font-weight="700"
    fill="white"
    filter="url(#shadow)"
    letter-spacing="0"
  >曆</text>
</svg>
